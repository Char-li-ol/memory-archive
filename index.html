<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>365 — Memory Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050505;
      color: #f3f0ea;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.03), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,0.02), transparent 30%),
        radial-gradient(circle at 50% 80%, rgba(255,255,255,0.025), transparent 40%);
      pointer-events: none;
    }
    .grain {
      position: fixed;
      inset: 0;
      background-image: url('https://grainy-gradients.vercel.app/noise.svg');
      opacity: 0.07;
      pointer-events: none;
      mix-blend-mode: soft-light;
    }
    .container {
      width: 90%;
      max-width: 820px;
      text-align: center;
      padding: 60px 20px;
      position: relative;
      z-index: 2;
    }
    .tiny {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.5;
      margin-bottom: 28px;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(42px, 8vw, 82px);
      font-weight: 400;
      line-height: 1;
      margin-bottom: 20px;
    }
    .intro {
      max-width: 640px;
      margin: 0 auto 50px;
      opacity: 0.72;
      line-height: 1.8;
      font-size: 15px;
    }
    .input-group {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }
    input {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      color: #f3f0ea;
      padding: 14px 16px;
      width: 150px;
      outline: none;
      font-size: 14px;
      letter-spacing: 1px;
      transition: 0.3s ease;
    }
    input:focus {
      border-color: rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.05);
    }
    button {
      background: #f3f0ea;
      color: #050505;
      border: none;
      padding: 14px 24px;
      cursor: pointer;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: 0.3s ease;
    }
    button:hover { opacity: 0.85; transform: translateY(-1px); }
    .result {
      margin-top: 50px;
      opacity: 0;
      transform: translateY(20px);
      transition: 1.2s ease;
    }
    .result.show { opacity: 1; transform: translateY(0); }
    .archive-label {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.45;
      margin-bottom: 20px;
    }
    .date {
      font-family: 'Cormorant Garamond', serif;
      font-size: 48px;
      margin-bottom: 16px;
    }
    .event-title { font-size: 22px; margin-bottom: 20px; line-height: 1.4; }
    .event-desc {
      opacity: 0.7;
      line-height: 1.9;
      max-width: 650px;
      margin: 0 auto 35px;
      font-size: 15px;
    }
    .reflection {
      margin-top: 30px;
      padding-top: 30px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      line-height: 1.5;
      opacity: 0.92;
    }
    .footer {
      margin-top: 80px;
      font-size: 12px;
      opacity: 0.4;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    @media (max-width: 640px) {
      .reflection { font-size: 22px; }
      .date { font-size: 38px; }
    }
  </style>
</head>
<body>

  <div class="grain"></div>

  <div class="container">
    <div class="tiny">memory archive // 365</div>
    <h1>Every Date<br>Already Belongs<br>To History</h1>
    <p class="intro">
      Before you were born, your birthday already carried the weight of something.
      A discovery. A tragedy. A first step. A final goodbye.
      Search the archive.
    </p>

      <input type="text" id="month" placeholder="Month (​​​​​​​​​​​​​​​​
